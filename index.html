<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
    <title>Dreamora | 100% Functional Version</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --bg: #020617; --text: #f8fafc; --glass: rgba(15, 23, 42, 0.9); }
        body { background-color: #020617; color: #f8fafc; font-family: 'Plus Jakarta Sans', sans-serif; margin: 0; overflow-x: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .modal-hidden { display: none !important; }
        .dropdown-hidden { display: none; }
        .verified-badge { display: none; color: #3b82f6; }
        .show-verified { display: inline-block !important; }
        .chat-bubble-me { background: #3b82f6; border-radius: 18px 18px 4px 18px; align-self: flex-end; }
        .chat-bubble-them { background: #1e293b; border-radius: 18px 18px 18px 4px; align-self: flex-start; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="fixed w-full z-50 p-6">
        <div class="max-w-7xl mx-auto glass rounded-[2.5rem] px-8 py-4 flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-10">
                <div class="text-2xl font-black text-blue-500 italic tracking-tighter cursor-pointer" onclick="location.reload()">DREAMORA</div>
                <button id="navCommunityBtn" class="hidden text-xs font-black uppercase tracking-widest text-slate-500 hover:text-white transition">Community</button>
            </div>
            
            <div class="flex items-center gap-4">
                <!-- Profile Area -->
                <div id="profileSection" class="hidden relative">
                    <button id="profileBtn" class="flex items-center gap-3 p-1 pr-5 glass rounded-full hover:bg-white/10 transition border-white/10 border">
                        <img id="navAvatar" src="" class="w-10 h-10 rounded-full border-2 border-blue-500 bg-slate-800 object-cover">
                        <div class="flex items-center gap-1.5">
                            <span id="userNameNav" class="text-sm font-black hidden md:block tracking-tight uppercase">User</span>
                            <div class="verified-badge">
                                <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M6.267 3.455a3.066 3.066 0 001.745-.723 3.066 3.066 0 013.976 0 3.066 3.066 0 001.745.723 3.066 3.066 0 012.812 2.812c.051.643.304 1.254.723 1.745a3.066 3.066 0 010 3.976 3.066 3.066 0 00-.723 1.745 3.066 3.066 0 01-2.812 2.812 3.066 3.066 0 00-1.745.723 3.066 3.066 0 01-3.976 0 3.066 3.066 0 00-1.745-.723 3.066 3.066 0 01-2.812-2.812 3.066 3.066 0 00-.723-1.745 3.066 3.066 0 010-3.976 3.066 3.066 0 00.723-1.745 3.066 3.066 0 012.812-2.812zm7.44 5.252a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg>
                            </div>
                        </div>
                    </button>
                    <!-- Dropdown -->
                    <div id="profileDropdown" class="dropdown-hidden absolute right-0 mt-4 w-60 glass rounded-[2rem] py-4 shadow-2xl border-white/10 text-center">
                        <button id="openSettingsBtn" class="w-full text-left px-6 py-3 text-[10px] font-black hover:bg-white/5 transition italic uppercase">⚙️ Einstellungen</button>
                        <button id="logoutBtn" class="w-full text-left px-6 py-3 text-[10px] font-black text-red-500 hover:bg-red-500/10 transition border-t border-white/5 mt-2 uppercase">Abmelden</button>
                    </div>
                </div>
                <!-- Login Button -->
                <button id="navLoginBtn" class="bg-blue-600 text-white px-8 py-3 rounded-2xl font-black text-xs tracking-widest shadow-lg shadow-blue-500/20 transition uppercase">Login</button>
            </div>
        </div>
    </nav>

    <!-- AUTH MODAL -->
    <div id="authModal" class="modal-hidden fixed inset-0 z-[200] flex items-center justify-center bg-black/90 backdrop-blur-xl p-4">
        <div class="glass w-full max-w-md p-10 rounded-[3rem] shadow-2xl text-center border-white/10">
            <h2 id="modalTitle" class="text-4xl font-black mb-2 italic text-blue-500 uppercase tracking-tighter">Dreamora</h2>
            <p class="text-slate-500 text-[10px] mb-8 uppercase tracking-widest font-bold tracking-[0.2em]">Secure Gateway</p>
            
            <div class="grid grid-cols-2 gap-3 mb-6">
                <button id="btnGoogleAuth" class="flex items-center justify-center gap-2 bg-white text-black font-bold py-3 rounded-xl hover:bg-slate-200 transition text-[10px] uppercase">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-4 h-4"> Google
                </button>
                <button id="btnAppleAuth" class="flex items-center justify-center gap-2 bg-black text-white font-bold py-3 rounded-xl border border-white/10 hover:bg-zinc-900 transition text-[10px] uppercase">
                    <svg class="w-4 h-4 fill-current" viewBox="0 0 384 512"><path d="M318.7 268.7c-.2-36.7 16.4-64.4 50-84.8-18.8-26.9-47.2-41.7-84.7-44.6-35.5-2.8-74.3 20.7-88.5 20.7-15 0-49.4-19.7-76.4-19.7C63.3 141.2 4 184.8 4 273.5q0 39.3 14.4 81.2c12.8 36.7 59 126.7 107.2 125.2 25.2-.6 43-17.9 75.8-17.9 31.8 0 48.3 17.9 76.4 17.9 48.6-.7 90.4-82.5 102.6-119.3-65.2-30.7-61.7-90-61.7-91.9zm-56.6-164.2c27.3-32.4 24.8-61.9 24-72.5-24.1 1.4-52 16.4-67.9 34.9-17.5 19.8-27.8 44.3-25.6 71.9 26.1 2 49.9-11.4 69.5-34.3z"/></svg> Apple
                </button>
            </div>

            <div class="space-y-4">
                <input type="email" id="authEmail" placeholder="E-Mail" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none text-center focus:border-blue-500 transition">
                <input type="password" id="authPass" placeholder="Passwort" class="w-full bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none text-center focus:border-blue-500 transition">
                <p id="authErrorMsg" class="text-red-500 text-[10px] font-black uppercase h-4"></p>
                <button id="btnAuthAction" class="w-full bg-blue-600 py-4 rounded-2xl font-black tracking-widest hover:bg-blue-500 transition uppercase shadow-xl shadow-blue-500/20">Login</button>
            </div>
            
            <button id="switchAuthMode" class="mt-6 text-xs font-bold text-blue-500 hover:underline uppercase tracking-widest">Account erstellen</button>
            <button id="closeAuth" class="block w-full mt-6 text-[10px] text-slate-500 font-black uppercase tracking-widest">Abbrechen</button>
        </div>
    </div>

    <!-- SETTINGS MODAL -->
    <div id="settingsModal" class="modal-hidden fixed inset-0 z-[160] flex items-center justify-center bg-black/80 backdrop-blur-md p-4">
        <div class="glass w-full max-w-4xl rounded-[3rem] flex flex-col md:flex-row overflow-hidden border-white/10 shadow-2xl">
            <div class="w-full md:w-64 border-r border-white/10 p-8 bg-white/5">
                <h2 class="text-2xl font-black mb-8 italic uppercase tracking-tighter">Settings</h2>
                <nav class="space-y-2">
                    <button id="tabBtn3D" class="w-full text-left px-4 py-3 rounded-xl bg-blue-600/20 font-black text-[10px] uppercase tracking-widest">3D Avatar</button>
                    <button id="tabBtnMonster" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 font-black text-[10px] uppercase tracking-widest transition">Monster</button>
                    <button id="tabBtnSecurity" class="w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 font-black text-[10px] uppercase tracking-widest transition">Account</button>
                </nav>
                <button id="closeSettings" class="mt-12 w-full bg-white/5 py-3 rounded-2xl text-[10px] font-black uppercase hover:bg-white/20 transition">Schließen</button>
            </div>
            <div class="flex-grow p-8 max-h-[85vh] overflow-y-auto">
                <div id="tab-3d" class="tab-content">
                    <h3 class="text-2xl font-black mb-6 italic uppercase">3D Character</h3>
                    <div id="avatarDisplayArea" class="flex flex-col items-center justify-center min-h-[300px] glass rounded-[2rem] p-6 mb-4">
                        <img id="avatarPreviewImg" class="w-48 h-48 object-contain mb-4 hidden">
                        <p id="noAvatarMsg" class="text-slate-500 italic">Erstelle deinen personalisierten 3D Avatar.</p>
                        <button id="btnEdit3D" class="bg-blue-600 px-8 py-3 rounded-xl font-bold text-xs mt-4 uppercase">Editor öffnen</button>
                    </div>
                    <div id="iframeContainer" class="hidden">
                        <iframe id="avatarIframe" class="w-full h-[500px] rounded-[2rem] border-none" src=""></iframe>
                    </div>
                </div>
                <!-- Monster & Security Tabs kommen hier... -->
                <div id="tab-monster" class="tab-content hidden">
                    <h3 class="text-xl font-black mb-6 italic uppercase">Monster Galerie</h3>
                    <div id="avatarGrid" class="grid grid-cols-4 gap-3"></div>
                </div>
                <div id="tab-security" class="tab-content hidden space-y-6">
                    <h3 class="text-xl font-black italic uppercase">Profilname</h3>
                    <div class="flex gap-2">
                        <input type="text" id="changeNameInput" placeholder="Neuer Name" class="flex-grow bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-blue-500">
                        <button id="btnUpdateName" class="bg-blue-600 px-6 rounded-2xl font-bold uppercase text-xs">Save</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <main class="h-screen flex flex-col items-center justify-center text-center px-6">
        <h1 class="text-7xl md:text-9xl font-black tracking-tighter mb-4 italic uppercase leading-none">DREAM <span class="text-blue-500 italic">LOG.</span></h1>
        <p class="text-slate-500 text-lg font-medium max-w-xl">Alle Systeme sind bereit. Logge dich ein, um fortzufahren.</p>
    </main>

    <!-- FIREBASE SCRIPT -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, GoogleAuthProvider, OAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // CONFIGURATION
        const firebaseConfig = {
            apiKey: "AIzaSyD-UJZGKUGRJW-8VywkoZLxd5QNUQNB1fw",
            authDomain: "dreamora-e379a.firebaseapp.com",
            projectId: "dreamora-e379a",
            storageBucket: "dreamora-e379a.appspot.com",
            messagingSenderId: "1016342666502",
            appId: "1:1016342666502:web:8410d27cc926916f0e1287"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const googleProvider = new GoogleAuthProvider();

        // ELEMENT REFS
        const $ = (id) => document.getElementById(id);
        let isLoginMode = true;

        // --- AUTH EVENT LISTENERS ---
        $('navLoginBtn').addEventListener('click', () => {
            isLoginMode = true;
            updateAuthUI();
            $('authModal').classList.remove('modal-hidden');
        });

        $('closeAuth').addEventListener('click', () => $('authModal').classList.add('modal-hidden'));
        
        $('switchAuthMode').addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            updateAuthUI();
        });

        function updateAuthUI() {
            $('modalTitle').innerText = isLoginMode ? "DREAMORA" : "SIGN UP";
            $('btnAuthAction').innerText = isLoginMode ? "LOGIN" : "REGISTER";
            $('switchAuthMode').innerText = isLoginMode ? "Account erstellen" : "Zum Login wechseln";
            $('authErrorMsg').innerText = "";
        }

        $('btnAuthAction').addEventListener('click', async () => {
            const email = $('authEmail').value;
            const pass = $('authPass').value;
            if(!email || !pass) return;
            
            try {
                if(isLoginMode) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const userCred = await createUserWithEmailAndPassword(auth, email, pass);
                    await syncUser(userCred.user);
                }
                $('authModal').classList.add('modal-hidden');
            } catch (e) {
                $('authErrorMsg').innerText = "Fehler: E-Mail oder Passwort falsch.";
            }
        });

        $('btnGoogleAuth').addEventListener('click', async () => {
            try {
                const res = await signInWithPopup(auth, googleProvider);
                await syncUser(res.user);
                $('authModal').classList.add('modal-hidden');
            } catch (e) {
                alert("Fehler: Domain nicht autorisiert oder abgebrochen.");
            }
        });

        // --- PROFILE & SETTINGS ---
        $('profileBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            $('profileDropdown').classList.toggle('dropdown-hidden');
        });

        window.addEventListener('click', () => $('profileDropdown').classList.add('dropdown-hidden'));

        $('openSettingsBtn').addEventListener('click', () => $('settingsModal').classList.remove('modal-hidden'));
        $('closeSettings').addEventListener('click', () => $('settingsModal').classList.add('modal-hidden'));
        $('logoutBtn').addEventListener('click', () => signOut(auth));

        // TABS
        const setupTab = (id) => {
            $(`tabBtn${id}`).addEventListener('click', () => {
                ['3d', 'Monster', 'Security'].forEach(t => {
                    $(`tab-${t.toLowerCase()}`).classList.add('hidden');
                    $(`tabBtn${t}`).classList.remove('bg-blue-600/20');
                });
                $(`tab-${id.toLowerCase()}`).classList.remove('hidden');
                $(`tabBtn${id}`).classList.add('bg-blue-600/20');
            });
        };
        ['3d', 'Monster', 'Security'].forEach(setupTab);

        // --- MONSTER GALLERY ---
        const monsters = ["Bluey", "Sparky", "Milo", "Luna", "Rusty", "Gloop", "Zorp", "Beep"];
        monsters.forEach(m => {
            const url = `https://api.dicebear.com/7.x/bottts/svg?seed=${m}`;
            const img = document.createElement('img');
            img.src = url;
            img.className = "cursor-pointer rounded-xl p-2 glass hover:bg-white/10 transition";
            img.onclick = async () => {
                if(auth.currentUser) {
                    await updateProfile(auth.currentUser, { photoURL: url });
                    $('navAvatar').src = url;
                    await syncUser(auth.currentUser);
                }
            };
            $('avatarGrid').appendChild(img);
        });

        // --- 3D AVATAR (RPM) ---
        $('btnEdit3D').addEventListener('click', () => {
            $('avatarDisplayArea').classList.add('hidden');
            $('iframeContainer').classList.remove('hidden');
            $('avatarIframe').src = `https://dreamora.readyplayer.me/avatar?frameApi`;
        });

        window.addEventListener('message', async (event) => {
            try {
                const json = JSON.parse(event.data);
                if (json?.source === 'readyplayerme' && json.eventName === 'v1.avatar.exported') {
                    const url = json.data.url;
                    const thumb = `${url.replace('.glb', '.png')}?camera=portrait`;
                    await updateProfile(auth.currentUser, { photoURL: thumb });
                    await syncUser(auth.currentUser);
                    location.reload();
                }
            } catch (e) {}
        });

        // --- UTILS ---
        async function syncUser(user) {
            await setDoc(doc(db, "users", user.uid), {
                uid: user.uid,
                name: user.displayName || user.email.split('@')[0],
                avatar: user.photoURL || "",
                email: user.email
            }, { merge: true });
        }

        $('btnUpdateName').onclick = async () => {
            const name = $('changeNameInput').value;
            if(name) {
                await updateProfile(auth.currentUser, { displayName: name });
                $('userNameNav').innerText = name.toUpperCase();
                await syncUser(auth.currentUser);
                alert("Name aktualisiert!");
            }
        };

        // --- AUTH OBSERVER ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                $('profileSection').classList.remove('hidden');
                $('navCommunityBtn').classList.remove('hidden');
                $('navLoginBtn').classList.add('hidden');
                $('userNameNav').innerText = (user.displayName || user.email.split('@')[0]).toUpperCase();
                $('navAvatar').src = user.photoURL || `https://api.dicebear.com/7.x/bottts/svg?seed=${user.uid}`;
                
                if(user.email.toLowerCase() === 'hellopey@web.de') {
                    document.querySelectorAll('.verified-badge').forEach(b => b.classList.add('show-verified'));
                }
                if(user.photoURL && user.photoURL.includes('readyplayer.me')) {
                    $('avatarPreviewImg').src = user.photoURL;
                    $('avatarPreviewImg').classList.remove('hidden');
                    $('noAvatarMsg').classList.add('hidden');
                }
            } else {
                $('profileSection').classList.add('hidden');
                $('navCommunityBtn').classList.add('hidden');
                $('navLoginBtn').classList.remove('hidden');
            }
        });

    </script>
</body>
</html>
