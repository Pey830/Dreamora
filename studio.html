<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvatarForge — 3D Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --bg2: #12121a; --accent: #7c6fff; --accent2: #ff6b9d;
    --text: #f0eeff; --text2: #9990cc; --border: rgba(124,111,255,0.2);
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  header { padding: 20px 40px; background: rgba(10,10,15,0.95); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: 'Syne', sans-serif; font-size: 24px; font-weight: 800; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .main { display: grid; grid-template-columns: 300px 1fr 280px; flex: 1; }
  .sidebar { background: var(--bg2); border-right: 1px solid var(--border); padding: 30px; }
  .sidebar-right { background: var(--bg2); border-left: 1px solid var(--border); padding: 30px; }
  .center { position: relative; background: radial-gradient(circle at center, #1a1a26 0%, #0a0a0f 100%); flex: 1; }
  .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(124,111,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,111,255,0.03) 1px, transparent 1px); background-size: 50px 50px; }
  iframe { width: 100%; height: 100%; border: none; z-index: 10; position: relative; }
  .loader { position: absolute; inset: 0; z-index: 20; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.5s; }
  .spinner { width: 50px; height: 50px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .status-box { background: var(--bg); padding: 20px; border-radius: 20px; border: 1px solid var(--border); margin-top: 20px; }
</style>
</head>
<body>

<header>
  <div class="logo">DREAMORA <span style="font-weight:400; opacity:0.5">STUDIO</span></div>
  <button onclick="location.href='index.html'" style="background:none; border:1px solid var(--border); color:var(--text); padding:10px 20px; border-radius:12px; cursor:pointer">Abbrechen</button>
</header>

<div class="main">
  <div class="sidebar">
    <h3 style="font-family:'Syne'; font-size:12px; text-transform:uppercase; letter-spacing:2px; color:var(--accent); margin-bottom:20px">Designer</h3>
    <p style="font-size:13px; color:var(--text2); line-height:1.6">Passe deinen Avatar im mittleren Fenster an. Klicke auf "Avatar benutzen", wenn du fertig bist.</p>
  </div>

  <div class="center">
    <div class="bg-grid"></div>
    <div id="loader" class="loader"><div class="spinner"></div><p style="margin-top:15px; font-weight:bold; opacity:0.5 uppercase">Lade Engine...</p></div>
    <iframe id="rpm-frame" allow="camera; microphone; clipboard-write"></iframe>
  </div>

  <div class="sidebar-right">
    <h3 style="font-family:'Syne'; font-size:12px; text-transform:uppercase; letter-spacing:2px; color:var(--text2); margin-bottom:20px">Status</h3>
    <div class="status-box">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px">
        <div style="width:8px; height:8px; background:#00e5cc; border-radius:50%; box-shadow: 0 0 10px #00e5cc"></div>
        <span style="font-size:11px; font-weight:bold">LIVE CONNECTION</span>
      </div>
      <p id="statusText" style="font-size:12px; color:var(--text2)">Bereit zum Gestalten.</p>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD-UJZGKUGRJW-8VywkoZLxd5QNUQNB1fw",
    authDomain: "dreamora-e379a.firebaseapp.com",
    projectId: "dreamora-e379a",
    storageBucket: "dreamora-e379a.appspot.com",
    messagingSenderId: "1016342666502",
    appId: "1:1016342666502:web:8410d27cc926916f0e1287"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const frame = document.getElementById('rpm-frame');
  const loader = document.getElementById('loader');
  const statusText = document.getElementById('statusText');

  // RPM Iframe laden
  frame.src = `https://demo.readyplayer.me/de/avatar?frameApi&clearCache`;

  window.addEventListener('message', async (event) => {
    const json = parse(event);
    if (json?.source !== 'readyplayerme') return;

    if (json.eventName === 'v1.ready') {
      loader.style.opacity = '0';
      setTimeout(() => loader.remove(), 500);
    }

    if (json.eventName === 'v1.avatar.exported') {
      const glbUrl = json.data.url;
      const previewImg = `${glbUrl.replace('.glb', '.png')}?camera=portrait`;
      statusText.innerText = "Avatar wird gespeichert...";

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          // In Firestore & Auth speichern
          await setDoc(doc(db, "users", user.uid), { 
            avatar3d: glbUrl,
            avatar: previewImg 
          }, { merge: true });
          
          await updateProfile(user, { photoURL: previewImg });
          
          window.location.href = "index.html";
        }
      });
    }
  });

  function parse(event) { try { return JSON.parse(event.data); } catch (e) { return null; } }
</script>
</body>
</html>
