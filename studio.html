<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Dreamora Studio | Ultra 2D Designer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { background: #020617; color: white; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; margin: 0; }
        .glass { background: rgba(15, 23, 42, 0.85); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .item-card { cursor: pointer; transition: 0.2s; border: 2px solid transparent; background: rgba(255,255,255,0.03); border-radius: 18px; height: 65px; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 800; text-transform: uppercase; text-align: center; color: rgba(255,255,255,0.5); }
        .item-card:hover { background: rgba(255,255,255,0.08); transform: translateY(-2px); }
        .item-card.active { border-color: #3b82f6; background: rgba(59, 130, 246, 0.1); color: #3b82f6; }
        
        .cat-btn { font-size: 22px; opacity: 0.3; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 14px; border-radius: 20px; background: none; border: none; cursor: pointer; color: white; }
        .cat-btn.active { opacity: 1; background: rgba(59, 130, 246, 0.2); color: #3b82f6; transform: scale(1.1); }
        
        #char-svg { height: 85vh; filter: drop-shadow(0 25px 60px rgba(0,0,0,0.9)); transition: 0.3s; }
        
        input[type="color"] { border: none; width: 50px; height: 50px; cursor: pointer; background: none; -webkit-appearance: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 3px solid rgba(255,255,255,0.2); border-radius: 50%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex flex-col">

    <!-- HEADER -->
    <header class="p-6 flex justify-between items-center z-50 border-b border-white/5 bg-[#020617]/80 backdrop-blur-md">
        <button id="btnBack" class="glass px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-white/5 transition border-white/10">Abbrechen</button>
        <div class="text-2xl font-black italic tracking-tighter">DREAMORA <span class="text-blue-500">STUDIO</span></div>
        <button id="saveBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-10 py-3 rounded-2xl font-black uppercase text-xs shadow-[0_0_30px_rgba(59,130,246,0.4)] transition-all active:scale-95">Charakter Speichern</button>
    </header>

    <div class="flex-grow flex flex-col md:flex-row overflow-hidden p-6 gap-8">
        
        <!-- PREVIEW AREA (LEFT) -->
        <div class="flex-grow glass rounded-[4rem] flex items-center justify-center relative bg-gradient-to-tr from-slate-950 via-slate-900 to-slate-950 overflow-hidden border-white/5">
            <svg id="char-svg" viewBox="0 0 200 500" xmlns="http://www.w3.org/2000/svg">
                <!-- Ebene 0: Haut & Körper -->
                <g id="base-layer">
                    <path id="skin-body" d="M75,180 Q100,170 125,180 L125,330 Q100,340 75,330 Z" fill="#ffdbac"/>
                    <circle id="skin-head" cx="100" cy="130" r="42" fill="#ffdbac"/>
                    <rect id="arm-l" x="55" y="185" width="18" height="120" rx="9" fill="#ffdbac" />
                    <rect id="arm-r" x="127" y="185" width="18" height="120" rx="9" fill="#ffdbac" />
                    <rect id="leg-l-base" x="78" y="330" width="20" height="140" fill="#ffdbac" />
                    <rect id="leg-r-base" x="102" y="330" width="20" height="140" fill="#ffdbac" />
                </g>

                <!-- Ebene 1: Gesicht -->
                <g id="mesh-eyes"></g>
                <g id="mesh-mouth"></g>

                <!-- Ebene 2: Kleidung -->
                <g id="group-bottom"><path id="mesh-bottom" d="" fill="#808080"/></g>
                <g id="group-top"><path id="mesh-top" d="" fill="#111111"/></g>

                <!-- Ebene 3: Haare -->
                <path id="mesh-hair" d="" fill="#222"/>

                <!-- Ebene 4: Accessoires (Ganz oben) -->
                <g id="mesh-access"></g>
            </svg>

            <!-- Floating Color Selector -->
            <div class="absolute bottom-10 glass p-4 rounded-full flex items-center gap-6 border-white/10 shadow-2xl">
                <div class="flex flex-col items-center">
                    <input type="color" id="universalColor" value="#3b82f6">
                    <span class="text-[8px] font-black uppercase mt-1 opacity-50 tracking-tighter">Color</span>
                </div>
                <div class="h-8 w-px bg-white/10"></div>
                <p id="activeCatDisplay" class="text-[10px] font-black uppercase text-blue-500 tracking-widest italic">Hair</p>
            </div>
        </div>

        <!-- CONTROL PANEL (RIGHT) -->
        <aside class="w-full md:w-[500px] glass rounded-[3.5rem] flex flex-col overflow-hidden shadow-2xl border-white/10">
            <!-- Sub-Navigation -->
            <div class="flex flex-wrap justify-between p-6 border-b border-white/5 bg-white/5">
                <button id="nav-hair" class="cat-btn active">💇</button>
                <button id="nav-eyes" class="cat-btn">👁️</button>
                <button id="nav-mouth" class="cat-btn">👄</button>
                <button id="nav-top" class="cat-btn">👕</button>
                <button id="nav-bottom" class="cat-btn">👖</button>
                <button id="nav-access" class="cat-btn">👓</button>
                <button id="nav-skin" class="cat-btn">👤</button>
            </div>

            <!-- Scrollable Items -->
            <div class="flex-grow overflow-y-auto p-8">
                <div id="itemGrid" class="grid grid-cols-2 gap-4">
                    <!-- Items per JS -->
                </div>
            </div>
        </aside>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-UJZGKUGRJW-8VywkoZLxd5QNUQNB1fw",
            authDomain: "dreamora-e379a.firebaseapp.com",
            projectId: "dreamora-e379a",
            storageBucket: "dreamora-e379a.appspot.com",
            messagingSenderId: "1016342666502",
            appId: "1:1016342666502:web:8410d27cc926916f0e1287"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const $ = (id) => document.getElementById(id);
        let currentTab = 'hair';
        let config = { hair:0, eyes:0, mouth:0, top:0, bottom:0, access:0, skin:0,
                        hairCol:'#222222', topCol:'#111111', bottomCol:'#474747', skinCol:'#ffdbac', accessCol:'#000000' };

        const shapes = {
            hair: [
                "M60,115 Q100,50 140,115 L135,125 Q100,90 65,125 Z", // Buzz
                "M55,130 A45,45 0 1,1 145,130 Q100,115 55,130", // Afro
                "M60,120 Q60,70 100,70 Q140,70 140,120 L135,130 Q100,105 65,130 Z", // Classic
                "M60,120 Q60,60 100,60 Q140,60 140,150 L130,150 Q130,90 70,120 Z", // Side
                "M70,80 Q100,50 130,80 L130,130 L70,130 Z", // Knot
                "M50,130 Q50,40 150,40 L150,180 Q140,60 60,130 Z", // Emo
                "M70,70 H130 V130 H70 Z", // Flat
                "M80,85 Q100,30 120,85 L120,130 H80 Z", // Mohawk
                "M55,125 Q100,50 145,125 L140,135 Q100,100 60,135 Z", // Messy
                "M60,100 Q100,85 140,100 L130,180 H70 Z" // Rockstar
            ],
            eyes: [
                "<circle cx='88' cy='125' r='3.5' fill='black'/><circle cx='112' cy='125' r='3.5' fill='black'/>",
                "<ellipse cx='88' cy='125' rx='5' ry='3'/><ellipse cx='112' cy='125' rx='5' ry='3'/>",
                "<path d='M82,125 Q88,118 94,125 M106,125 Q112,118 118,125' stroke='black' fill='none' stroke-width='2'/>",
                "<rect x='84' y='123' width='8' height='4'/><rect x='108' y='123' width='8' height='4'/>",
                "<circle cx='88' cy='125' r='2' fill='black'/><circle cx='112' cy='125' r='2' fill='black'/>",
                "<path d='M83,122 L93,128 M107,122 L117,128' stroke='black' stroke-width='2'/>", // X Eyes
                "<circle cx='88' cy='125' r='4' stroke='black' fill='none'/><circle cx='112' cy='125' r='4' stroke='black' fill='none'/>",
                "<path d='M85,120 Q88,130 91,120 M109,120 Q112,130 115,120' stroke='black' fill='none'/>",
                "<circle cx='88' cy='125' r='4' fill='white' stroke='black'/><circle cx='112' cy='125' r='4' fill='white' stroke='black'/>",
                "<rect x='85' y='125' width='10' height='1'/><rect x='105' y='125' width='10' height='1'/>"
            ],
            mouth: [
                "<path d='M92,148 Q100,156 108,148' stroke='black' fill='none' stroke-width='2'/>",
                "<path d='M92,152 Q100,146 108,152' stroke='black' fill='none' stroke-width='2'/>",
                "<rect x='93' y='150' width='14' height='2' rx='1' fill='black'/>",
                "<circle cx='100' cy='152' r='4' fill='black'/>",
                "<path d='M90,150 H110' stroke='black' stroke-width='1'/>",
                "<path d='M92,148 L108,148' stroke='black' stroke-width='3' stroke-linecap='round'/>",
                "<circle cx='100' cy='152' r='2' fill='black'/>",
                "<path d='M95,148 Q100,152 105,148' stroke='black' fill='none'/>",
                "<path d='M92,148 Q95,155 100,150 Q105,155 108,148' stroke='black' fill='none'/>",
                "<path d='M96,152 Q100,154 104,152' stroke='black' fill='none'/>"
            ],
            top: [
                "M70,180 H130 V330 H70 Z", // T-Shirt (Short)
                "M70,180 H130 V330 H70 Z M50,185 H70 V320 H50 Z M130,185 H150 V320 H130 Z", // Longsleeve (ÄRMEL)
                "M65,175 H135 V340 H65 Z M45,185 H65 V320 H45 Z M135,185 H155 V320 H135 Z", // Hoodie
                "M82,180 H118 V330 H82 Z", // Tank
                "M65,175 H135 V335 H65 Z", // Oversize
                "M70,175 H130 V270 H70 Z", // Crop
                "M65,170 H135 V350 H65 Z", // Coat
                "M75,180 L125,180 L115,330 L85,330 Z", // V-Neck
                "M60,180 H140 V320 H60 Z", // XL
                "M70,180 H130 V330 L100,345 L70,330 Z" // Tech
            ],
            bottom: [
                "M78,330 H98 V475 H78 Z M102,330 H122 V475 H102 Z", // Straight
                "M78,330 Q65,400 78,475 H98 Q110,400 98,330 Z M102,330 Q90,400 102,475 H122 Q135,400 122,330 Z", // Baggy Wavy
                "M78,330 H98 V400 H78 Z M102,330 H122 V400 H102 Z", // Shorts
                "M78,330 H100 V430 H78 Z M100,330 H122 V430 H100 Z", // Cargo
                "M75,330 H125 V420 Q100,440 75,420 Z", // Skirt
                "M80,330 L75,475 H95 V330 Z M105,330 L125,475 H105 V330 Z", // Flare
                "M81,330 H95 V475 H81 Z M105,330 H119 V475 H105 Z", // Skinny
                "M78,330 H98 V450 H78 Z M102,330 H122 V450 H102 Z", // 7/8
                "M75,330 Q90,470 98,470 V330 Z M125,330 Q110,470 102,470 V330 Z", // Jogger
                "M78,330 Q70,350 78,410 H98 V330 Z M102,330 Q110,350 102,410 H122 V330 Z" // Boxers
            ],
            access: [
                "", // None
                "<rect x='80' y='122' width='16' height='10' rx='2' stroke='black' fill='none'/><rect x='104' y='122' width='16' height='10' rx='2' stroke='black' fill='none'/><path d='M96,127 H104' stroke='black'/>", // Glasses
                "<rect x='78' y='120' width='20' height='14' rx='2' fill='black'/><rect x='102' y='120' width='20' height='14' rx='2' fill='black'/><path d='M98,127 H102' stroke='black' stroke-width='4'/>", // OPAQUE SUNGLASSES
                "<path d='M90,175 Q100,195 110,175' stroke='silver' fill='none' stroke-width='2'/>", // Chain
                "<circle cx='68' cy='130' r='10' fill='black'/><circle cx='132' cy='130' r='10' fill='black'/><path d='M68,120 Q100,110 132,120' fill='none' stroke='black' stroke-width='3'/>", // Headphones
                "<path d='M75,130 H125 L135,145 H65 Z' fill='black' opacity='0.8'/>", // Mask
                "<circle cx='100' cy='110' r='5' fill='gold'/>", // Bindi
                "<path d='M80,185 Q100,200 120,185' stroke='gold' stroke-width='3' fill='none'/>", // Scarf
                "<rect x='90' y='80' width='20' height='2' fill='white'/>", // Bandage
                "<path d='M70,100 L130,100 L100,80 Z' fill='red'/>" // Party Hat
            ],
            skin: ["#ffdbac", "#f1c27d", "#e0ac69", "#8d5524", "#c68642", "#2d1d12", "#ffffff", "#e2e8f0", "#4ade80", "#3b82f6"]
        };

        // --- RENDER ENGINE ---
        function updatePreview() {
            $('mesh-hair').setAttribute('d', shapes.hair[config.hair] || "");
            $('mesh-hair').setAttribute('fill', config.hairCol);
            
            // Top Rendering
            let topHTML = `<path d="${shapes.top[config.top]}" fill="${config.topCol}"/>`;
            if(config.top === 2) topHTML += `<path d="M100,180 V220" stroke="rgba(255,255,255,0.3)" stroke-width="1.5"/><path d="M92,290 Q100,305 108,290" stroke="rgba(255,255,255,0.2)" fill="none"/>`;
            if(config.top === 1) topHTML += `<path d="M70,180 V330 M130,180 V330" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>`;
            $('group-top').innerHTML = topHTML;

            // Bottom Rendering
            let botHTML = `<path d="${shapes.bottom[config.bottom]}" fill="${config.bottomCol}"/>`;
            botHTML += `<path d="M85,340 V360 M115,340 V360" stroke="rgba(0,0,0,0.2)" stroke-width="1"/>`; // Pockets
            $('group-bottom').innerHTML = botHTML;

            $('mesh-eyes').innerHTML = shapes.eyes[config.eyes] || shapes.eyes[0];
            $('mesh-mouth').innerHTML = shapes.mouth[config.mouth] || shapes.mouth[0];
            $('mesh-access').innerHTML = shapes.access[config.access] || "";

            const s = config.skinCol;
            ['skin-body','skin-head','arm-l','arm-r','leg-l-base','leg-r-base'].forEach(id => $(id).setAttribute('fill', s));
        }

        window.setTab = (t) => {
            currentTab = t;
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            $('nav-'+t).classList.add('active');
            $('activeCatDisplay').innerText = t;
            
            const grid = $('itemGrid'); grid.innerHTML = '';
            const list = (t === 'skin') ? shapes.skin : (shapes[t] || Array(10).fill(""));
            
            list.forEach((_, i) => {
                const card = document.createElement('div');
                card.className = `item-card ${config[t] === i ? 'active' : ''}`;
                card.innerText = `${t} Style ${i+1}`;
                card.onclick = () => { 
                    config[t] = i; 
                    if(t === 'skin') config.skinCol = shapes.skin[i];
                    updatePreview(); 
                    window.setTab(t); 
                };
                grid.appendChild(card);
            });
        };

        // Events
        $('universalColor').oninput = (e) => {
            config[currentTab+'Col'] = e.target.value;
            updatePreview();
        };

        $('btnBack').onclick = () => location.href = 'index.html';
        
        $('saveBtn').onclick = async () => {
            const svgData = new XMLSerializer().serializeToString($('char-svg'));
            const base64 = "data:image/svg+xml;base64," + btoa(svgData);
            if(auth.currentUser) {
                await setDoc(doc(db, "users", auth.currentUser.uid), { avatar2d: base64 }, { merge: true });
                location.href = "index.html";
            }
        };

        // Navigation Init
        ['hair','eyes','mouth','top','bottom','access','skin'].forEach(t => {
            $(`nav-${t}`).onclick = () => window.setTab(t);
        });

        window.setTab('hair');
        updatePreview();
    </script>
</body>
</html>
