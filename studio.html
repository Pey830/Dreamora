<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AvatarForge — 3D Charakter Designer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --bg2: #12121a;
    --bg3: #1a1a26;
    --accent: #7c6fff;
    --accent2: #ff6b9d;
    --accent3: #00e5cc;
    --text: #f0eeff;
    --text2: #9990cc;
    --border: rgba(124,111,255,0.2);
    --glow: 0 0 30px rgba(124,111,255,0.3);
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    background: rgba(10,10,15,0.95);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(20px);
    z-index: 100;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }

  .logo span {
    font-weight: 400;
    -webkit-text-fill-color: var(--text2);
    font-size: 14px;
    margin-left: 8px;
    font-family: 'DM Sans', sans-serif;
  }

  .header-actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .btn {
    padding: 10px 20px;
    border-radius: 10px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-ghost {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    box-shadow: 0 4px 20px rgba(124,111,255,0.4);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(124,111,255,0.55); }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 260px 1fr 280px;
    flex: 1;
    overflow: hidden;
  }

  /* SIDEBAR LEFT */
  .sidebar {
    background: var(--bg2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 20px 20px 12px;
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    color: var(--text2);
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }

  .nav-tabs {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
  }

  .nav-tab {
    padding: 9px 6px;
    border-radius: 8px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--text2);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }

  .nav-tab:hover { background: var(--bg3); color: var(--text); }
  .nav-tab.active {
    background: rgba(124,111,255,0.15);
    border-color: rgba(124,111,255,0.4);
    color: var(--accent);
  }

  .category-list {
    flex: 1;
    overflow-y: auto;
    padding: 12px 12px;
  }

  .cat-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .cat-item.active {
    background: rgba(124,111,255,0.1);
    border-color: rgba(124,111,255,0.25);
  }

  .cat-icon {
    width: 36px; height: 36px; border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
  }
  .purple { background: rgba(124,111,255,0.2); }

  /* CENTER */
  .center {
    display: flex; flex-direction: column; position: relative; background: var(--bg); overflow: hidden;
  }
  .avatar-stage { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
  .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(124,111,255,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(124,111,255,0.04) 1px, transparent 1px); background-size: 40px 40px; }
  
  .rpm-wrapper { position: relative; width: 100%; height: 100%; z-index: 10; }
  #rpm-frame { width: 100%; height: 100%; border: none; display: block; }

  .loading-screen { position: absolute; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 20; transition: 0.5s; }
  .loading-screen.hidden { opacity: 0; visibility: hidden; }
  .spinner { width: 60px; height: 60px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--accent); animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* SIDEBAR RIGHT */
  .sidebar-right { background: var(--bg2); border-left: 1px solid var(--border); padding: 20px; }
  .url-display { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 12px; font-family: monospace; font-size: 10px; color: var(--accent3); word-break: break-all; }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:16px">
    <div class="logo">Dreamora <span>Studio</span></div>
  </div>
  <div class="header-actions">
    <button class="btn btn-ghost" onclick="location.href='index.html'">Abbrechen</button>
    <button class="btn btn-primary" onclick="alert('Bitte nutze den Speicher-Button im Designer!')">Fertigstellen</button>
  </div>
</header>

<div class="main">
  <!-- LEFT -->
  <div class="sidebar">
    <div class="sidebar-header">Kategorien</div>
    <div class="category-list">
      <div class="cat-item active"><div class="cat-icon purple">👤</div><div><div class="cat-label">Designer Aktiv</div></div></div>
    </div>
  </div>

  <!-- CENTER -->
  <div class="center">
    <div class="avatar-stage">
      <div class="bg-grid"></div>
      <div class="loading-screen" id="loadingScreen"><div class="spinner"></div></div>
      <div class="rpm-wrapper">
        <iframe id="rpm-frame" allow="camera; microphone; clipboard-write"></iframe>
      </div>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="sidebar-right">
    <p style="font-size:11px; font-weight:bold; color:var(--text2); margin-bottom:10px;">STATUS</p>
    <div id="statusBox" class="url-display">Warte auf Export...</div>
  </div>
</div>

<!-- FIREBASE & INTEGRATION -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD-UJZGKUGRJW-8VywkoZLxd5QNUQNB1fw",
    authDomain: "dreamora-e379a.firebaseapp.com",
    projectId: "dreamora-e379a",
    storageBucket: "dreamora-e379a.appspot.com",
    messagingSenderId: "1016342666502",
    appId: "1:1016342666502:web:8410d27cc926916f0e1287"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const frame = document.getElementById('rpm-frame');
  const loader = document.getElementById('loadingScreen');
  const statusBox = document.getElementById('statusBox');

  // RPM initialisieren
  frame.src = `https://demo.readyplayer.me/de/avatar?frameApi`;

  window.addEventListener('message', async (event) => {
    const json = parse(event);
    if (json?.source !== 'readyplayerme') return;

    if (json.eventName === 'v1.ready') {
      loader.classList.add('hidden');
    }

    if (json.eventName === 'v1.avatar.exported') {
      const avatarUrl = json.data.url;
      statusBox.innerText = "Speichere Avatar...";

      onAuthStateChanged(auth, async (user) => {
        if (user) {
          // In Firestore beim User speichern
          await setDoc(doc(db, "users", user.uid), {
            avatar3d: avatarUrl
          }, { merge: true });

          // Zurück zu Dreamora
          window.location.href = "index.html";
        } else {
          alert("Bitte logge dich erst ein!");
          window.location.href = "index.html";
        }
      });
    }
  });

  function parse(event) {
    try { return JSON.parse(event.data); } catch (e) { return null; }
  }
</script>
</body>
</html>
